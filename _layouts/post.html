---
layout: default
---
{% include JB/setup %}
<div id="article_wrap">
</div>

<div class="post">
    <h1 class="primary"> {{ page.title }}</h1>
    <hr />
    <div class="date">
        {{ page.date | date: "%Y年 %m月 %d日" }}
    </div>
    <div id="article_body">
        <div id='article_content'>
            {{ content }}
        </div>
    </div>
</div>
