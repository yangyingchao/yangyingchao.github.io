<p>
Simply two tips:
</p>

<ol class="org-ol">
<li>List files in a  RPM package which is not installed:

<div class="org-src-container">

<pre class="src src-sh"><span class="linenr">1: </span>rpm -qlp xxxx.rpm
</pre>
</div>
</li>

<li>List files in a RPM package which is installed:

<div class="org-src-container">

<pre class="src src-sh"><span class="linenr">1: </span>rpm -ql xxxx #with out extension name
</pre>
</div>
</li>
</ol>
