<p>
Simply two tips:
</p>

<ol class="org-ol">
<li><p>
List files in a  RPM package which is not installed:
</p>

<div class="org-src-container">
<pre class="src src-sh"><span class="linenr">1: </span>rpm -qlp xxxx.rpm
</pre>
</div></li>

<li><p>
List files in a RPM package which is installed:
</p>

<div class="org-src-container">
<pre class="src src-sh"><span class="linenr">1: </span>rpm -ql xxxx <span style="color: #cd5c5c; font-style: italic;">#</span><span style="color: #cd5c5c; font-style: italic;">with out extension name</span>
</pre>
</div></li>
</ol>
